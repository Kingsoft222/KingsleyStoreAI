<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official VirtualMall Receipt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #e60023; --success: #25D366; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .receipt-container { 
            background: white; 
            width: 90%; 
            max-width: 400px; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            border-top: 10px solid var(--primary); 
            position: relative;
        }
        .security-banner {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #eee;
        }
        h1 { color: var(--primary); font-size: 1.6rem; margin: 0; text-align: center; }
        .order-id { font-size: 0.8rem; color: #888; text-align: center; margin-bottom: 25px; }
        .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 0.95rem; }
        .total-row { 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: #111; 
            margin-top: 25px; 
            display: flex; 
            justify-content: space-between; 
            padding-top: 10px;
        }
        .verified-badge { 
            background: #e8f5e9; 
            color: #2e7d32; 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 0.8rem; 
            text-align: center; 
            margin-top: 30px; 
            font-weight: bold; 
            border: 1px solid #c8e6c9; 
        }
        .verified-badge i { margin-right: 5px; }
        .footer-note { font-size: 0.7rem; color: #aaa; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="receipt-container" id="receipt-box">
        <div style="text-align: center; padding: 20px;">
            <p>Authenticating Receipt...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        // --- DATA CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAhzPRw3Gw4nN1DlIxDa1KszH69I4bcHPE",
            authDomain: "kingsleystoreai.firebaseapp.com",
            projectId: "kingsleystoreai",
            storageBucket: "kingsleystoreai.firebasestorage.app",
            messagingSenderId: "31402654971",
            appId: "1:31402654971:web:26f75b0f913bcaf9f6445e",
            databaseURL: "https://kingsleystoreai-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Get the Order ID from the URL (e.g., ?id=VM-RCP-123)
        const orderId = new URLSearchParams(window.location.search).get('id');
        const display = document.getElementById('receipt-box');

        if(orderId) {
            // Fetch the permanent record from the "receipts" node created in app.js
            get(ref(db, `receipts/${orderId}`)).then(snapshot => {
                if(snapshot.exists()){
                    const data = snapshot.val();
                    
                    // Generate item list
                    let itemsHtml = data.items.map(item => `
                        <div class="item">
                            <span>${item.name}</span>
                            <b>₦${item.price.toLocaleString()}</b>
                        </div>
                    `).join('');

                    // Update UI with uneditable data
                    display.innerHTML = `
                        <div class="security-banner">
                            <i class="fas fa-lock"></i> Secure Connection: <b>${window.location.hostname}</b>
                        </div>
                        <h1>VirtualMall Verified</h1>
                        <div class="order-id">Official Receipt: <b>${orderId}</b><br>${data.date}</div>
                        
                        <div id="items-list">
                            ${itemsHtml}
                        </div>

                        <div class="total-row">
                            <span>TOTAL</span>
                            <span>₦${data.total.toLocaleString()}</span>
                        </div>

                        <div class="verified-badge">
                            <i class="fas fa-shield-alt"></i> VERIFIED BY VIRTUALMALL FOUNDER CENTER
                        </div>
                        <div class="footer-note">This document is a digital proof of purchase generated by the VirtualMall platform. It cannot be modified by the sender.</div>
                    `;
                } else {
                    display.innerHTML = `<h1>Invalid Receipt</h1><p>The Order ID <b>${orderId}</b> was not found in our secure records.</p>`;
                }
            }).catch(error => {
                display.innerHTML = "<h1>Error</h1><p>Failed to verify receipt. Please check your connection.</p>";
            });
        } else {
            display.innerHTML = "<h1>Access Denied</h1><p>No Order ID provided.</p>";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirtualMall Admin - Control Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #e60023; --bg: #f4f4f4; --card: #ffffff; }
        #login-section, #onboarding-section, #dashboard-section, #loading-screen { display: none; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h3 { margin-top: 0; color: #333; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #555; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: #eee; color: #333; }
        .btn-danger { background: none; color: #e60023; border: 1px solid #e60023; width: auto; padding: 5px 15px; margin-top: 5px; font-size: 0.8rem; }
        .btn-master { background: #000; color: #FFD700; display: none; margin-bottom: 20px; width: 100%; border: 1px solid #FFD700; }
        #master-vault-section table { width:100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; color: #fff; }
        #master-vault-section th { color: #FFD700; border-bottom: 2px solid #333; padding: 10px; text-align: left; }
        #master-vault-section td { padding: 10px; border-bottom: 1px solid #222; }
        #status-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 1000; }
        .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; display: none; margin: 10px auto; border: 3px solid var(--primary); }
        .inventory-item { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid #eee; }
        .inventory-item img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .inventory-item-details { flex-grow: 1; }
    </style>
</head>
<body>

<div id="loading-screen" style="display: flex;">
    <div class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: #e60023;"></div>
</div>

<div class="container">
    <div id="login-section" class="card" style="text-align: center;">
        <img src="https://cdn-icons-png.flaticon.com/512/3081/3081648.png" width="80">
        <h2>VirtualMall Admin</h2>
        <p style="color:#666; font-size:0.9rem;">Management & Accountability Center</p>
        <button class="btn-primary" onclick="window.loginWithGoogle()">Login with Google</button>
    </div>

    <div id="onboarding-section" class="card" style="text-align:center;">
        <h2 style="color:var(--primary);">Set Up Your Store</h2>
        <div class="form-group"><label>Choose Store Username</label><input type="text" id="setup-username" placeholder="e.g. kingsley-fashion"></div>
        <div class="form-group"><label>Business Name</label><input type="text" id="setup-bizname"></div>
        <div class="form-group"><label>WhatsApp Number</label><input type="number" id="setup-phone" placeholder="e.g. 2348000000000"></div>
        <button class="btn-primary" onclick="window.createStoreProfile()">Launch My Store <i class="fas fa-rocket"></i></button>
    </div>

    <div id="dashboard-section">
        <button id="master-btn" class="btn-master" onclick="window.toggleMasterVault()">
            <i class="fas fa-crown"></i> MASTER VAULT (FOUNDER ONLY)
        </button>

        <div id="master-vault-section" class="card" style="display:none; background: #000; color: #fff; border: 1px solid #333;">
            <h3 style="color:#FFD700;"><i class="fas fa-crown"></i> Founder's Control Room</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Profile Link</th>
                            <th>Joined</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="user-records-body"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h3>Profile Settings</h3>
            <div style="text-align:center;">
                <img id="admin-img-preview" class="preview-img">
                <input type="file" id="admin-pic-upload" style="display:none;" onchange="window.handleAdminImage(event)">
                <button class="btn-outline" onclick="document.getElementById('admin-pic-upload').click()">Change Photo</button>
            </div>
            <div class="form-group"><label>Store Name</label><input type="text" id="admin-store-name"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group"><label>Ad 1</label><input type="text" id="admin-label-1"></div>
                <div class="form-group"><label>Ad 2</label><input type="text" id="admin-label-2"></div>
            </div>
            <div class="form-group"><label>WhatsApp</label><input type="number" id="admin-phone"></div>
            <div class="form-group"><label>Search Hint</label><input type="text" id="admin-search-hint"></div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="greetings-toggle" style="width:auto;"> <label>AI Greetings</label>
            </div>
            <textarea id="admin-greetings" rows="3"></textarea>
            <button id="save-btn" class="btn-primary" onclick="window.saveStoreSettings()">Save Settings</button>
            <p style="text-align:center;"><a id="my-store-link" target="_blank" style="color:var(--primary); font-weight:bold;"></a></p>
        </div>

        <div id="add-product-section" class="card">
            <h3>Add Product</h3>
            <input type="text" id="prod-name" placeholder="Name">
            <input type="number" id="prod-price" placeholder="Price">
            <select id="prod-brand">
                <option value="Native Wear">Native Wear</option>
                <option value="Suits">Suits</option>
                <option value="Casual">Casual</option>
            </select>
            <input type="file" onchange="window.handleProductImagePreview(event)">
            <img id="prod-img-preview" style="width:100px; height:100px; display:none; border-radius:8px;">
            <button id="upload-prod-btn" class="btn-primary" onclick="window.uploadNewProduct()">Add Item</button>
        </div>

        <div class="card">
            <h3>Inventory</h3>
            <div id="inventory-list"></div>
        </div>

        <button class="btn-outline" onclick="window.logoutAdmin()">Logout</button>
    </div>
</div>

<div id="status-toast"></div>
<script type="module" src="admin.js"></script>
</body>
</html>
